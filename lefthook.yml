# Lefthook config for rivcomocktrial.
# Backstop guardrails for the active domain refactor (ADR-012, ADR-013).
# In-session guardrails are in .claude/hooks/; this catches everything
# the in-session hooks miss (manual git commits, agent-spawned
# subprocesses, etc.).
#
# Install: brew install lefthook && lefthook install
# Skip a single check: ALLOW_FROZEN_EDIT=1 git commit ...
#                     ALLOW_UNPAIRED=1 git commit ...

pre-commit:
  parallel: true
  commands:

    persistence-freeze:
      # Block commits that touch frozen paths (ADR-013).
      # Override: ALLOW_FROZEN_EDIT=1 git commit ...
      run: |
        if [ "${ALLOW_FROZEN_EDIT:-0}" = "1" ]; then exit 0; fi
        frozen=$(git diff --cached --name-only \
          | grep -E '^(backend/pb_hooks/|backend/pb_migrations/|frontend/src/Api\.elm$|frontend/src/Pb\.elm$)' \
          || true)
        if [ -n "$frozen" ]; then
          echo "FROZEN PATH: refusing commit. These paths are read-only" >&2
          echo "during the domain refactor (ADR-013):" >&2
          echo "$frozen" | sed 's/^/  /' >&2
          echo "" >&2
          echo "If a thaw is justified, document it as an ADR and re-run with:" >&2
          echo "  ALLOW_FROZEN_EDIT=1 git commit ..." >&2
          exit 1
        fi

    domain-pair:
      # Modifying a top-level domain module requires a paired edit
      # to its test file in the same commit (per docs/refactor-process.md).
      # Override: ALLOW_UNPAIRED=1 git commit ...
      run: |
        if [ "${ALLOW_UNPAIRED:-0}" = "1" ]; then exit 0; fi
        staged=$(git diff --cached --name-only)
        missing=""
        for f in $(echo "$staged" | grep -E '^frontend/src/[^/]+\.elm$' || true); do
          # Skip framework files — not domain modules.
          base=$(basename "$f")
          case "$base" in
            Api.elm|Pb.elm|Effect.elm|Shared.elm|Auth.elm|UI.elm|RemoteData.elm)
              continue ;;
          esac
          rel=${f#frontend/src/}
          test="frontend/tests/${rel%.elm}Test.elm"
          if ! echo "$staged" | grep -qx "$test"; then
            missing="$missing\n  $f → expected paired edit to $test"
          fi
        done
        if [ -n "$missing" ]; then
          printf "DOMAIN-PAIR: domain modules modified without paired test edits:%s\n" "$missing" >&2
          echo "" >&2
          echo "Per docs/refactor-process.md, modifying a domain module" >&2
          echo "requires editing its test file in the same commit." >&2
          echo "" >&2
          echo "If unpaired is justified (rare), re-run with:" >&2
          echo "  ALLOW_UNPAIRED=1 git commit ..." >&2
          exit 1
        fi
