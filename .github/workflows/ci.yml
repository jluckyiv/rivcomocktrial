name: CI

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "backend/pb_hooks/**"
      - "backend/pb_migrations/**"
      - "backend/Dockerfile.dev"
      - "docker-compose.test.yml"
      - ".env.test"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "web/**"
      - "backend/pb_hooks/**"
      - "backend/pb_migrations/**"
      - "backend/Dockerfile.dev"
      - "docker-compose.test.yml"
      - ".env.test"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci.yml"

jobs:
  web-tests:
    name: web tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Install Playwright browsers
        # prepare script runs `playwright install || echo ''` which silences
        # failures; this step ensures chromium + OS deps are present for the
        # vitest client-project browser test in vitest-examples.
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Load test environment
        # .env.test is committed — local test credentials with no production value.
        # Appending to GITHUB_ENV makes PB_URL, PB_ADMIN_EMAIL, PB_ADMIN_PASSWORD
        # available to all subsequent steps without re-sourcing.
        # Strip comment lines and blank lines: GITHUB_ENV only accepts KEY=VALUE.
        run: grep -v '^\s*#' .env.test | grep -v '^\s*$' >> $GITHUB_ENV

      - name: Start test PocketBase container
        # docker-compose.test.yml port 28090; --wait polls the healthcheck.
        # Starting here (before test:unit) ensures the vitest server project's
        # hook and schema specs have PocketBase available.
        run: npm run pb:test:up

      - name: Lint
        run: npm run lint
        working-directory: web

      - name: Type check
        run: npm run check
        working-directory: web

      - name: Unit tests
        # Runs all vitest projects (server + client). GitHub Actions sets CI=true,
        # which causes vitest v4 to run once rather than entering watch mode.
        run: npm run test:unit
        working-directory: web

      - name: Schema tests
        # Root script: starts container (idempotent) + sources .env.test + vitest schema
        run: npm run test:schema

      - name: Hook integration tests
        # Root script: starts container (idempotent) + sources .env.test + vitest hooks
        run: npm run test:hooks
