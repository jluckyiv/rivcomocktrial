name: Deploy to fly.io

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "backend/**"
      - "fly.staging.toml"
      - "fly.toml"
      - ".dockerignore"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      target:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging

jobs:
  migrate-check:
    name: migration smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download PocketBase
        run: |
          set -euo pipefail
          PB_VERSION=$(grep 'ARG PB_VERSION=' backend/Dockerfile | cut -d= -f2)
          wget "https://github.com/pocketbase/pocketbase/releases/download/v${PB_VERSION}/pocketbase_${PB_VERSION}_linux_amd64.zip" \
            -O /tmp/pb.zip
          unzip /tmp/pb.zip -d /tmp/pb/
          chmod +x /tmp/pb/pocketbase

      - name: Apply migrations and smoke-check health
        run: |
          set -euo pipefail
          mkdir -p /tmp/pb_data
          /tmp/pb/pocketbase serve \
            --http=127.0.0.1:8091 \
            --dir=/tmp/pb_data \
            --migrationsDir=backend/pb_migrations \
            --hooksDir=backend/pb_hooks &
          PB_PID=$!

          for i in $(seq 1 30); do
            if ! kill -0 "$PB_PID" 2>/dev/null; then
              echo "PocketBase exited early"
              exit 1
            fi
            if curl -sf http://127.0.0.1:8091/api/health > /dev/null; then
              echo "PocketBase healthy after ${i}s"
              break
            fi
            sleep 1
            if [ "$i" -eq 30 ]; then
              echo "PocketBase did not become healthy within 30s"
              kill "$PB_PID" 2>/dev/null || true
              exit 1
            fi
          done

          kill "$PB_PID"
          wait "$PB_PID" 2>/dev/null || true

  staging:
    needs: migrate-check
    if: github.event_name == 'push' || github.event.inputs.target == 'staging'
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_APP: rivcomocktrial-staging
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Snapshot pb_data before deploy
        # Take a fresh snapshot of the pb_data volume before deploying.
        # If this step fails the job fails and `flyctl deploy` does not run,
        # so the live volume is never touched without a known-good snapshot.
        # See docs/backups.md for the rollback procedure.
        run: |
          set -euo pipefail
          VOLUME_ID=$(flyctl volumes list -a "$FLY_APP" --json | jq -r '.[0].id')
          if [ -z "$VOLUME_ID" ] || [ "$VOLUME_ID" = "null" ]; then
            echo "Could not resolve volume ID for $FLY_APP" >&2
            exit 1
          fi
          PRE=$(flyctl volumes snapshots list "$VOLUME_ID" -a "$FLY_APP" --json | jq -r '.[].id' | sort)
          flyctl volumes snapshots create "$VOLUME_ID" -a "$FLY_APP"
          POST=$(flyctl volumes snapshots list "$VOLUME_ID" -a "$FLY_APP" --json | jq -r '.[].id' | sort)
          SNAPSHOT_ID=$(comm -13 <(echo "$PRE") <(echo "$POST") | head -n 1)
          {
            echo "## Pre-deploy snapshot"
            echo ""
            echo "- App: \`$FLY_APP\`"
            echo "- Volume: \`$VOLUME_ID\`"
            echo "- Snapshot: \`${SNAPSHOT_ID:-unknown}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - run: flyctl deploy --remote-only --config fly.staging.toml

  production:
    needs: migrate-check
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production'
    runs-on: ubuntu-latest
    environment: production
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_APP: rivcomocktrial
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Snapshot pb_data before deploy
        # Take a fresh snapshot of the pb_data volume before deploying.
        # If this step fails the job fails and `flyctl deploy` does not run,
        # so the live volume is never touched without a known-good snapshot.
        # See docs/backups.md for the rollback procedure.
        run: |
          set -euo pipefail
          VOLUME_ID=$(flyctl volumes list -a "$FLY_APP" --json | jq -r '.[0].id')
          if [ -z "$VOLUME_ID" ] || [ "$VOLUME_ID" = "null" ]; then
            echo "Could not resolve volume ID for $FLY_APP" >&2
            exit 1
          fi
          PRE=$(flyctl volumes snapshots list "$VOLUME_ID" -a "$FLY_APP" --json | jq -r '.[].id' | sort)
          flyctl volumes snapshots create "$VOLUME_ID" -a "$FLY_APP"
          POST=$(flyctl volumes snapshots list "$VOLUME_ID" -a "$FLY_APP" --json | jq -r '.[].id' | sort)
          SNAPSHOT_ID=$(comm -13 <(echo "$PRE") <(echo "$POST") | head -n 1)
          {
            echo "## Pre-deploy snapshot"
            echo ""
            echo "- App: \`$FLY_APP\`"
            echo "- Volume: \`$VOLUME_ID\`"
            echo "- Snapshot: \`${SNAPSHOT_ID:-unknown}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - run: flyctl deploy --remote-only --config fly.toml
