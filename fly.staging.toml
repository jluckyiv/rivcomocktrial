app = "rivcomocktrial-staging"
primary_region = "lax"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  SMTP_HOST = "smtp.resend.com"
  SMTP_PORT = "465"
  SMTP_USERNAME = "resend"
  SMTP_TLS = "true"
  SMTP_SENDER_ADDRESS = "noreply@rivcomocktrial.org"
  SMTP_SENDER_NAME = "Riverside County Mock Trial"

[http_service]
  internal_port = 8090
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "pb_data"
  destination = "/pb/pb_data"
